<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CQ Invoice">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#242424">
<link rel="apple-touch-icon" href="clarqueyweb.png">
<link rel="icon" type="image/png" href="clarqueyweb.png">
<title>Clarquey — Invoice Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #1c1c1c;
  --surface:    #242424;
  --surface2:   #2e2e2e;
  --border:     #393939;
  --accent:     #f0ff00;
  --accent-dim: #a8c200;
  --text:       #f0f0f0;
  --text-muted: #777;
  --text-dim:   #999;
  --danger:     #ff4545;
  --success:    #49adf4;
  --radius:     14px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
  position: fixed;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
  html {
  background: var(--surface);
}


/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-left: 20px;
  padding-right: 20px;
  padding-bottom: 14px;
  padding-top: max(14px, env(safe-area-inset-top));
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
}

.topbar-sub {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

/* ── MAIN ── */
.main {
  padding: 16px 20px 110px;
  max-width: 600px;
  margin: 0 auto;
  height: calc(100vh - 60px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

@supports (padding: max(0px)) {
  .main {
    padding-bottom: max(90px, calc(70px + env(safe-area-inset-bottom)));
  }
}

/* ── SECTION LABEL ── */
.section-label {
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #666;
  margin-bottom: 12px;
  margin-top: 28px;
}

.section-label:first-child { margin-top: 0; }

/* ── FIELD ── */
.field { margin-bottom: 12px; }

.field label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.field input,
.field textarea,
.field select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid transparent;
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  padding: 14px 16px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
  appearance: none;
}

.field input:focus,
.field textarea:focus,
.field select:focus {
  border-color: var(--accent);
  background: #323232;
}

.field input::placeholder,
.field textarea::placeholder {
  color: var(--text-muted);
}

.field textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* ── TEMPLATE TABS ── */
.template-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 12px;
}

.tpl-btn {
  padding: 12px 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.03em;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.tpl-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

.tpl-desc {
  font-size: 11px;
  color: var(--text-muted);
  padding: 8px 4px;
  line-height: 1.7;
  margin-bottom: 4px;
}

/* ── INVOICE NO PREVIEW ── */
.inv-no-preview {
  font-size: 14px;
  color: var(--accent);
  font-weight: 700;
  padding: 12px 16px;
  background: var(--surface2);
  border: 1px dashed var(--accent-dim);
  border-radius: var(--radius);
  margin-bottom: 12px;
  letter-spacing: 0.05em;
}

/* ── COMPUTED BOX ── */
.computed-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
}

.computed-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}

.computed-row:last-child { border-bottom: none; }

.computed-label { color: var(--text-dim); }
.computed-value { font-weight: 700; color: var(--text); }
.computed-row.accent .computed-value { color: var(--accent); }
.computed-row.green .computed-value { color: var(--accent); }
.computed-row.paid .computed-label { color: #49adf4; }
.computed-row.paid .computed-value { color: #49adf4; }

/* ── BUTTONS ── */
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 28px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 20px;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.btn-primary { background: var(--accent); color: #000; }
.btn-primary:active { transform: scale(0.98); }

.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
}
.btn-secondary:active { background: var(--surface2); }

.btn-wa {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
}

.btn-wa:active { background: var(--surface2); }

/* ── HIDDEN INVOICE (untuk PDF) ── */
#invoice-for-pdf {
  position: fixed;
  left: -9999px;
  top: 0;
  width: 620px;
  visibility: hidden;
}

/* ── INVOICE STYLES ── */
.inv-wrap {
  width: 620px;
  background: #fff;
  padding: 40px 44px;
  font-family: 'DM Sans', sans-serif;
  color: #111;
}

.inv-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 28px;
}

.inv-logo {
  width: 110px;
  height: 80px;
  background: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.inv-logo-text {
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
}

.inv-company { text-align: right; }

.inv-company-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 6px;
}

.inv-company-name {
  font-size: 14px;
  font-weight: 700;
  color: #111;
  margin-bottom: 8px;
}

.inv-company-address {
  font-size: 8.5px;
  color: #666;
  line-height: 1.8;
}

.inv-billto-bar {
  background: #f5f5f5;
  padding: 14px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.inv-billto-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 6px;
}

.inv-client-name {
  font-size: 13px;
  font-weight: 700;
  color: #111;
  margin-bottom: 2px;
}

.inv-client-wa { font-size: 10px; color: #555; }

.inv-meta-right { text-align: right; }

.inv-meta-row {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 20px;
  margin-bottom: 4px;
}

.inv-meta-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #999;
}

.inv-meta-value {
  font-size: 11px;
  font-weight: 700;
  color: #111;
  min-width: 100px;
  text-align: right;
}

.badge-pending { color: #b45309; }
.badge-balance { color: #1d4ed8; }
.badge-settled { color: #166534; }

.inv-table { width: 100%; border-collapse: collapse; }
.inv-table thead tr { border-bottom: 2px solid #111; }

.inv-table thead th {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #111;
  padding: 8px 8px 10px;
  text-align: left;
}

.inv-table thead th.right { text-align: right; }
.inv-table tbody tr { border-bottom: 1px solid #e8e8e8; }

.inv-table tbody td {
  padding: 16px 8px;
  font-size: 10px;
  color: #333;
  vertical-align: top;
  line-height: 1.6;
}

.inv-table tbody td.right { text-align: right; white-space: nowrap; }

.item-title { font-weight: 700; font-size: 11px; color: #111; margin-bottom: 4px; line-height: 1.5; }
.item-detail { font-size: 9.5px; color: #555; line-height: 1.7; }

.inv-totals { display: flex; justify-content: flex-end; }
.inv-totals-table { width: 280px; }

.total-row {
  display: flex;
  justify-content: space-between;
  padding: 7px 8px;
  border-bottom: 1px solid #f0f0f0;
}

.total-label { font-size: 10px; color: #666; font-weight: 500; }
.total-value { font-size: 10px; font-weight: 600; color: #111; }

.paid-text { color: #16a34a; }
.paid-label { color: #16a34a !important; }

.total-row.amount-due {
  border-top: 2px solid #111;
  border-bottom: 2px solid #111;
  margin-top: 4px;
  padding: 10px 8px;
  background: transparent;
}

.total-row.amount-due .total-label,
.total-row.amount-due .total-value {
  color: #111 !important;
  font-size: 11px;
  font-weight: 700;
}

.total-label { font-size: 10px; color: #666; font-weight: 500; }
.total-value { font-size: 10px; font-weight: 600; color: #111; }

.paid-text { color: #16a34a; }
.paid-label { color: #16a34a !important; }

.inv-bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-top: 28px;
}

.inv-section-title {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #111;
  margin-bottom: 8px;
}

.inv-bank-name { font-size: 10.5px; font-weight: 700; color: #111; margin-bottom: 2px; }
.inv-bank-no { font-size: 10px; color: #333; line-height: 1.7; }

.inv-signature { text-align: center; min-width: 180px; }
.inv-sign-greeting { font-size: 9px; color: #555; margin-bottom: 2px; }
.inv-sign-company { font-size: 9px; font-weight: 700; color: #111; margin-bottom: 28px; }

.inv-sign-logo {
  width: 90px;
  height: 34px;
  background: #1a1a1a;
  margin: 0 auto 4px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.inv-sign-logo-text { color: #fff; font-size: 7px; font-weight: 700; letter-spacing: 0.2em; }
.inv-sign-name { font-size: 9px; font-weight: 700; color: #111; text-decoration: underline; margin-top: 4px; }
.inv-sign-title { font-size: 8px; color: #888; margin-top: 2px; }

.inv-terms { margin-top: 24px; }
.inv-terms-list { list-style: none; padding: 0; }

.inv-terms-list li {
  font-size: 8px;
  color: #555;
  line-height: 1.8;
  padding-left: 12px;
  position: relative;
}

.inv-terms-list li::before { content: "•"; position: absolute; left: 0; color: #999; }

.inv-note { margin-top: 20px; padding-top: 14px; border-top: 1px solid #e8e8e8; }
.inv-note-title { font-size: 8px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #111; margin-bottom: 6px; }
.inv-note-text { font-size: 8px; color: #666; line-height: 1.8; }

  /* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  padding-bottom: max(env(safe-area-inset-bottom), 20px);
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 0 8px;
  gap: 4px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
}

.nav-item svg {
  width: 22px;
  height: 22px;
  fill: var(--text-muted);
  transition: fill 0.15s;
}

.nav-item span {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  transition: color 0.15s;
}

.nav-item.active svg { fill: var(--accent); }
.nav-item.active span { color: var(--accent); }

  /* Native app feel */
* {
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

input, textarea, select {
  -webkit-user-select: text;
  user-select: text;
}

body {
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
}

 /* ── CLIENT SEARCH ── */
.search-wrap { position: relative; margin-bottom: 12px; }

.search-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--surface);
  border: 1px solid var(--accent-dim);
  border-radius: var(--radius);
  z-index: 50;
  overflow: hidden;
  display: none;
}

.search-dropdown.visible { display: block; }

.search-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.search-item:last-child { border-bottom: none; }
.search-item:active { background: var(--surface2); }

.search-item-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
}

.search-item-meta {
  font-size: 10px;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  line-height: 1.6;
}

.search-empty {
  padding: 14px 16px;
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
}

.search-loading {
  padding: 14px 16px;
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
} 

  .search-wrap input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid transparent;
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  padding: 14px 16px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
  appearance: none;
}

.search-wrap input:focus {
  border-color: var(--accent);
  background: #323232;
}

.search-wrap input::placeholder {
  color: var(--text-muted);
}
  
</style>

  <!-- PWA Native Feel -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CQ Invoice">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c1c1c">

<!-- Prevent zoom -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="apple-touch-icon" href="clarqueyweb.png">
<link rel="apple-touch-icon-precomposed" href="clarqueyweb.png">
<link rel="icon" type="image/png" href="clarqueyweb.png"> 
  
</head>
<body>

<div class="topbar">
  <div class="logo">
  <img src="clarqueyweb.png" style="height:43px;width:auto;display:block;" alt="Clarquey">
  </div>
  <div class="topbar-sub">Invoice Generator</div>
</div>

<div class="main">

 <div class="field">
    <label>Nomor Invoice </label>
 </div>

<div class="inv-no-preview" id="inv-no-display">Memuat...</div>

<div class="field">
  <label>Ubah Urutan (3 angka terakhir)</label>
  <input type="text" id="inv-seq" maxlength="3" placeholder="007" oninput="overrideSeq()">
</div>

<div class="section-label" id="label-search" style="display:none">Cari Data DP</div>

<div class="search-wrap" id="search-wrap" style="display:none">
  <input type="text" id="search-input" placeholder="Adaro/Minerals/Indonesia"
    oninput="onSearchInput(this.value)" autocomplete="off">
  <div class="search-dropdown" id="search-dropdown"></div>
</div>
  
  <div class="section-label">Data Client</div>

  <div class="field">
    <label>Nama Client</label>
    <input type="text" id="client-name" placeholder="Personal/Corporate"
    oninput="this.value = this.value.toUpperCase()">
</div>
  
  <div class="field">
    <label>Kontak</label>
    <input type="tel" id="client-wa" placeholder="08xx/62xx" oninput="formatWA(this)">
</div>

  <div class="field">
    <label>Tanggal</label>
    <input type="date" id="inv-date">
  </div>

  <div class="section-label">Deskripsi Project</div>

  <div class="field">
    <label>Judul</label>
    <input type="text" id="proj-title" placeholder="Company Profile"
      oninput="this.value = this.value.replace(/\b\w/g, c => c.toUpperCase())">
  </div>
  
  <div class="field">
    <label>Detail</label>
    <textarea id="proj-detail" placeholder="Full day coverage, 2 kamera, aerial drone, highlights film 5-7 menit"></textarea>
  </div>

  <div class="section-label">Harga</div>

  <div class="field">
    <label>Total Project (Rp)</label>
    <input type="number" id="total-price" placeholder="57000000" oninput="updateCalc()">
  </div>

  <div class="computed-box" id="computed-box"></div>

  <div class="field">
    <label>Aksi</label>
 </div>

  <div class="btn-group">
    <button class="btn btn-primary" id="btn-pdf" onclick="downloadPDF()">Download PDF</button>
    <button class="btn btn-wa" onclick="sendWA()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">

    <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.117 1.528 5.845L.057 23.571a.75.75 0 0 0 .921.921l5.726-1.471A11.943 11.943 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.694 9.694 0 0 1-4.944-1.352l-.355-.21-3.664.941.957-3.553-.23-.368A9.699 9.699 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/>
  </svg>
  Kirim ke WhatsApp
</button>
    <button class="btn btn-secondary" onclick="resetForm()">↺ Reset Form</button>
  </div>

</div>

<!-- Invoice tersembunyi, hanya untuk generate PDF -->
<div id="invoice-for-pdf">
  <div class="inv-wrap" id="invoice-content"></div>

<script>

function fmt(n) {
  if (!n || isNaN(n)) return 'Rp 0';
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}

function formatWA(input) {
  let val = input.value.replace(/\D/g, '');
  if (val.startsWith('08')) val = '62' + val.slice(1);
  else if (val.startsWith('8')) val = '62' + val;
  input.value = val;
}

async function fetchLastSeq() {
  const display = document.getElementById('inv-no-display');

    autoYY = String(today.getFullYear()).slice(-2);

    if (json.status === 'ok' && json.lastNo) {
  const cleanNo = String(json.lastNo).replace(/-DP$|-PEL$|-SET$/i, '');
  const parts   = cleanNo.split('-');
  const lastSeq = parseInt(parts[2]) || 0;
  autoSeq = String(lastSeq + 1).padStart(3, '0');
} else {
  autoSeq = '001';
}

    document.getElementById('inv-seq').value = '';

function updateInvoiceNo() {

function getCurrentInvNo() {

function getValues() {

    clientWA:   document.getElementById('client-wa').value,

async function saveToSheets() {
  const v = getValues();
  const tplLabel = { dp:'DP 50%', pel:'Pelunasan', set:'Settled' }[currentTemplate];
  const payload = {
    invoiceNo: v.invNo, tanggal: v.invDate, clientName: v.clientName,
    clientWA: v.clientWA, projTitle: v.projTitle, projDetail: v.projDetail, total: v.total,
    dp: v.dp, sisa: v.sisa, template: tplLabel
  };
  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    const json = await res.json();
    return json.status === 'ok';
  } catch(err) {
    console.error('Sheets error:', err);
    return false;
  }
}

function downloadPDF() {
  const v = getValues();

  // Validasi field wajib
  const missing = [];
  if (!v.clientName)  missing.push('Nama Client');
  if (!v.clientWA)    missing.push('Nomor WhatsApp');
  if (!v.invDate)     missing.push('Tanggal Invoice');
  if (!v.projTitle)   missing.push('Judul Project');
  if (!v.total)       missing.push('Total Harga');

  if (missing.length > 0) {
    alert('Data belum lengkap:\n• ' + missing.join('\n• '));
    return;
  }

  sessionStorage.setItem('cq_invoice', JSON.stringify({ template: currentTemplate, ...v }));
  saveToSheets();
  window.open('invoice.html', '_blank');
}

  let searchTimer = null;

function onSearchInput(val) {
  clearTimeout(searchTimer);
  const dd = document.getElementById('search-dropdown');

  if (val.length < 2) {
    dd.innerHTML = '';
    dd.classList.remove('visible');
    return;
  }

  dd.innerHTML = '<div class="search-loading">Mencari...</div>';
  dd.classList.add('visible');

  searchTimer = setTimeout(() => doSearch(val), 600);
}

async function doSearch(query) {
  const dd = document.getElementById('search-dropdown');
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=search&q=${encodeURIComponent(query)}`);
    const json = await res.json();

    if (!json.results || json.results.length === 0) {
      dd.innerHTML = '<div class="search-empty">Tidak ada data DP ditemukan</div>';
      return;
    }

    dd.innerHTML = json.results.map((r, i) => `
      <div class="search-item" onclick="selectClient(${i})">
        <div class="search-item-name">${r.clientName}</div>
        <div class="search-item-meta">
          ${r.invoiceNo} &nbsp;•&nbsp; ${r.tanggal}<br>
          ${r.projTitle} &nbsp;•&nbsp; Rp ${Number(r.total).toLocaleString('id-ID')}
        </div>
      </div>
    `).join('');

    // Simpan hasil ke variable global
    window._searchResults = json.results;

  } catch(err) {
    dd.innerHTML = '<div class="search-empty">Gagal mengambil data</div>';
  }
}

function selectClient(idx) {
  const r  = window._searchResults[idx];
  const dd = document.getElementById('search-dropdown');

  // Auto-fill semua field
  document.getElementById('client-name').value  = r.clientName;
  document.getElementById('client-wa').value    = r.clientWA;
  document.getElementById('proj-title').value   = r.projTitle;
  document.getElementById('proj-detail').value  = r.projDetail || '';
  document.getElementById('total-price').value  = r.total;

  // Set nomor invoice — ambil base number dari DP, hapus suffix -DP
  const baseNo = r.invoiceNo.replace('-DP', '');
  const parts  = baseNo.split('-'); // ['CQ', '0526', '001']
  if (parts.length >= 3) {
    document.getElementById('inv-seq').value = parts[2];
    // Update MM YY dari nomor invoice DP
    autoMM = parts[1].slice(0, 2);
    autoYY = parts[1].slice(2, 4);
  }

  // Set tanggal hari ini untuk invoice baru
  const today = new Date();
  document.getElementById('inv-date').value = today.toISOString().split('T')[0];

  // Tutup dropdown
  dd.classList.remove('visible');
  document.getElementById('search-input').value = r.clientName;

  updateInvoiceNo();
  updateCalc();
}

function resetForm() {
  if (!confirm('Reset semua isian?')) return;
  document.querySelectorAll('input, textarea').forEach(el => el.value = '');
  document.getElementById('computed-box').innerHTML = '';
  setTemplate('dp', document.querySelector('.tpl-btn'));
  fetchLastSeq();
}

(function() {
  const today = new Date();
  document.getElementById('inv-date').value = today.toISOString().split('T')[0];
  updateCalc();
  fetchLastSeq();
})();
