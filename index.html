<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarquey — Invoice Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #1c1c1c;
  --surface:    #242424;
  --surface2:   #2e2e2e;
  --border:     #393939;
  --accent:     #f0ff00;
  --accent-dim: #a8c200;
  --text:       #f0f0f0;
  --text-muted: #777;
  --text-dim:   #999;
  --danger:     #ff4545;
  --success:    #49adf4;
  --radius:     14px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
}

.topbar-sub {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

/* ── MAIN ── */
.main {
  padding: 24px 20px 80px;
  max-width: 600px;
  margin: 0 auto;
}

/* ── SECTION LABEL ── */
.section-label {
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #666;
  margin-bottom: 12px;
  margin-top: 28px;
}

.section-label:first-child { margin-top: 0; }

/* ── FIELD ── */
.field { margin-bottom: 12px; }

.field label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.field input,
.field textarea,
.field select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid transparent;
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 14px 16px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
  appearance: none;
}

.field input:focus,
.field textarea:focus,
.field select:focus {
  border-color: var(--accent);
  background: #323232;
}

.field input::placeholder,
.field textarea::placeholder {
  color: var(--text-muted);
}

.field textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* ── TEMPLATE TABS ── */
.template-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 12px;
}

.tpl-btn {
  padding: 12px 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.03em;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.tpl-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

.tpl-desc {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  line-height: 1.7;
  margin-bottom: 4px;
}

/* ── INVOICE NO PREVIEW ── */
.inv-no-preview {
  font-size: 14px;
  color: var(--accent);
  font-weight: 700;
  padding: 12px 16px;
  background: var(--surface2);
  border: 1px dashed var(--accent-dim);
  border-radius: var(--radius);
  margin-bottom: 12px;
  letter-spacing: 0.05em;
}

/* ── COMPUTED BOX ── */
.computed-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
}

.computed-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}

.computed-row:last-child { border-bottom: none; }

.computed-label { color: var(--text-dim); }
.computed-value { font-weight: 700; color: var(--text); }
.computed-row.accent .computed-value { color: var(--accent); }
.computed-row.green .computed-value { color: #4dff91; }
.computed-row.paid .computed-label { color: #4dff91; }
.computed-row.paid .computed-value { color: #4dff91; }

/* ── BUTTONS ── */
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 28px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 20px;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.btn-primary { background: var(--accent); color: #000; }
.btn-primary:active { transform: scale(0.98); }

.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
}
.btn-secondary:active { background: var(--surface2); }

.btn-wa { background: #25d366; color: #fff; }
.btn-wa:active { background: #1fb559; }

/* ── HIDDEN INVOICE (untuk PDF) ── */
#invoice-for-pdf {
  position: absolute;
  left: -9999px;
  top: 0;
  width: 620px;
}

/* ── INVOICE STYLES ── */
.inv-wrap {
  width: 620px;
  background: #fff;
  padding: 40px 44px;
  font-family: 'DM Sans', sans-serif;
  color: #111;
}

.inv-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 28px;
}

.inv-logo {
  width: 110px;
  height: 80px;
  background: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.inv-logo-text {
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
}

.inv-company { text-align: right; }

.inv-company-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 6px;
}

.inv-company-name {
  font-size: 14px;
  font-weight: 700;
  color: #111;
  margin-bottom: 8px;
}

.inv-company-address {
  font-size: 8.5px;
  color: #666;
  line-height: 1.8;
}

.inv-billto-bar {
  background: #f5f5f5;
  padding: 14px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.inv-billto-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 6px;
}

.inv-client-name {
  font-size: 13px;
  font-weight: 700;
  color: #111;
  margin-bottom: 2px;
}

.inv-client-wa { font-size: 10px; color: #555; }

.inv-meta-right { text-align: right; }

.inv-meta-row {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 20px;
  margin-bottom: 4px;
}

.inv-meta-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #999;
}

.inv-meta-value {
  font-size: 11px;
  font-weight: 700;
  color: #111;
  min-width: 100px;
  text-align: right;
}

.badge-pending { color: #b45309; }
.badge-balance { color: #1d4ed8; }
.badge-settled { color: #166534; }

.inv-table { width: 100%; border-collapse: collapse; }
.inv-table thead tr { border-bottom: 2px solid #111; }

.inv-table thead th {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #111;
  padding: 8px 8px 10px;
  text-align: left;
}

.inv-table thead th.right { text-align: right; }
.inv-table tbody tr { border-bottom: 1px solid #e8e8e8; }

.inv-table tbody td {
  padding: 16px 8px;
  font-size: 10px;
  color: #333;
  vertical-align: top;
  line-height: 1.6;
}

.inv-table tbody td.right { text-align: right; white-space: nowrap; }

.item-title { font-weight: 700; font-size: 11px; color: #111; margin-bottom: 4px; line-height: 1.5; }
.item-detail { font-size: 9.5px; color: #555; line-height: 1.7; }

.inv-totals { display: flex; justify-content: flex-end; }
.inv-totals-table { width: 280px; }

.total-row {
  display: flex;
  justify-content: space-between;
  padding: 7px 8px;
  border-bottom: 1px solid #f0f0f0;
}

.total-row.amount-due {
  background: #111;
  border-bottom: none;
  margin-top: 4px;
  padding: 10px 12px;
}

.total-label { font-size: 10px; color: #666; font-weight: 500; }
.total-value { font-size: 10px; font-weight: 600; color: #111; }

.total-row.amount-due .total-label,
.total-row.amount-due .total-value { color: #fff; font-size: 11px; font-weight: 700; }

.paid-text { color: #16a34a; }
.paid-label { color: #16a34a !important; }

.inv-bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-top: 28px;
}

.inv-section-title {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #111;
  margin-bottom: 8px;
}

.inv-bank-name { font-size: 10.5px; font-weight: 700; color: #111; margin-bottom: 2px; }
.inv-bank-no { font-size: 10px; color: #333; line-height: 1.7; }

.inv-signature { text-align: center; min-width: 180px; }
.inv-sign-greeting { font-size: 9px; color: #555; margin-bottom: 2px; }
.inv-sign-company { font-size: 9px; font-weight: 700; color: #111; margin-bottom: 28px; }

.inv-sign-logo {
  width: 90px;
  height: 34px;
  background: #1a1a1a;
  margin: 0 auto 4px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.inv-sign-logo-text { color: #fff; font-size: 7px; font-weight: 700; letter-spacing: 0.2em; }
.inv-sign-name { font-size: 9px; font-weight: 700; color: #111; text-decoration: underline; margin-top: 4px; }
.inv-sign-title { font-size: 8px; color: #888; margin-top: 2px; }

.inv-terms { margin-top: 24px; }
.inv-terms-list { list-style: none; padding: 0; }

.inv-terms-list li {
  font-size: 8px;
  color: #555;
  line-height: 1.8;
  padding-left: 12px;
  position: relative;
}

.inv-terms-list li::before { content: "•"; position: absolute; left: 0; color: #999; }

.inv-note { margin-top: 20px; padding-top: 14px; border-top: 1px solid #e8e8e8; }
.inv-note-title { font-size: 8px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #111; margin-bottom: 6px; }
.inv-note-text { font-size: 8px; color: #666; line-height: 1.8; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Clarquey</div>
  <div class="topbar-sub">Invoice Generator</div>
</div>

<div class="main">

  <div class="section-label">Template</div>

  <div class="template-tabs">
    <div class="tpl-btn active" onclick="setTemplate('dp', this)">DP 50%</div>
    <div class="tpl-btn" onclick="setTemplate('pel', this)">Pelunasan</div>
    <div class="tpl-btn" onclick="setTemplate('set', this)">Settled</div>
  </div>

  <div class="tpl-desc" id="tpl-desc">
    Invoice tagihan uang muka 50%. Dikirim sebelum project dimulai.
  </div>

  <div class="section-label">Nomor Invoice</div>

  <div class="field-row">
    <div class="field">
      <label>Bulan (MM)</label>
      <input type="text" id="inv-mm" maxlength="2" placeholder="05" oninput="updateInvoiceNo()">
    </div>
    <div class="field">
      <label>Tahun (YY)</label>
      <input type="text" id="inv-yy" maxlength="2" placeholder="25" oninput="updateInvoiceNo()">
    </div>
  </div>
  <div class="field">
    <label>Urutan</label>
    <input type="text" id="inv-seq" maxlength="3" placeholder="001" oninput="updateInvoiceNo()">
  </div>
  <div class="inv-no-preview" id="inv-no-display">CQ-0526-001</div>

  <div class="section-label">Data Client</div>

  <div class="field">
    <label>Nama Client</label>
    <input type="text" id="client-name" placeholder="PT. Maju Bersama">
  </div>
  <div class="field">
    <label>Nomor WhatsApp</label>
    <input type="text" id="client-wa" placeholder="+6281234567890">
  </div>

  <div class="section-label">Tanggal Invoice</div>

  <div class="field">
    <label>Tanggal</label>
    <input type="date" id="inv-date">
  </div>

  <div class="section-label">Deskripsi Project</div>

  <div class="field">
    <label>Judul (bold)</label>
    <input type="text" id="proj-title" placeholder="Wedding Videography – Ahmad & Siti">
  </div>
  <div class="field">
    <label>Detail</label>
    <textarea id="proj-detail" placeholder="Full day coverage, 2 kamera, aerial drone, highlights film 5-7 menit, same day edit teaser"></textarea>
  </div>

  <div class="section-label">Harga</div>

  <div class="field">
    <label>Total Project (Rp)</label>
    <input type="number" id="total-price" placeholder="5000000" oninput="updateCalc()">
  </div>

  <div class="computed-box" id="computed-box"></div>

  <div class="section-label">Aksi</div>

  <div class="btn-group">
    <button class="btn btn-primary" id="btn-pdf" onclick="downloadPDF()">↓ Download PDF</button>
    <button class="btn btn-wa" onclick="sendWA()">✉ Kirim ke WhatsApp</button>
    <button class="btn btn-secondary" onclick="resetForm()">↺ Reset Form</button>
  </div>

</div>

<!-- Invoice tersembunyi, hanya untuk generate PDF -->
<div id="invoice-for-pdf">
  <div class="inv-wrap" id="invoice-content"></div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxMMUACAf51NE-woqrnna1ByeFs6zSrsJYlcqWft9d8chVaIhDsdAmgX3V6vvsaMeh90Q/exec';

let currentTemplate = 'dp';

const tplDescs = {
  dp:  'Invoice tagihan uang muka 50%. Dikirim sebelum project dimulai.',
  pel: 'Invoice pelunasan 50% sisa tagihan. Dikirim setelah video selesai diambil.',
  set: 'Invoice konfirmasi lunas. Semua pembayaran sudah diterima.'
};

function setTemplate(tpl, el) {
  currentTemplate = tpl;
  document.querySelectorAll('.tpl-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tpl-desc').textContent = tplDescs[tpl];
  updateCalc();
}

function fmt(n) {
  if (!n || isNaN(n)) return 'Rp 0';
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}

function getValues() {
  const mm  = document.getElementById('inv-mm').value  || '05';
  const yy  = document.getElementById('inv-yy').value  || '26';
  const seq = document.getElementById('inv-seq').value || '001';
  const invNo = `CQ-${mm}${yy}-${seq.padStart(3,'0')}`;

  const rawDate = document.getElementById('inv-date').value;
  let invDate = '';
  if (rawDate) {
    const d = new Date(rawDate);
    invDate = d.toLocaleDateString('id-ID', { day:'2-digit', month:'long', year:'numeric' });
  }

  const total = parseFloat(document.getElementById('total-price').value) || 0;
  const dp    = total * 0.5;
  const sisa  = total - dp;

  return {
    invNo,
    invDate,
    clientName: document.getElementById('client-name').value,
    clientWA:   document.getElementById('client-wa').value,
    projTitle:  document.getElementById('proj-title').value,
    projDetail: document.getElementById('proj-detail').value,
    total, dp, sisa
  };
}

function updateInvoiceNo() {
  const mm  = document.getElementById('inv-mm').value  || '??';
  const yy  = document.getElementById('inv-yy').value  || '??';
  const seq = (document.getElementById('inv-seq').value || '001').padStart(3,'0');
  document.getElementById('inv-no-display').textContent = `CQ-${mm}${yy}-${seq}`;
}

function updateCalc() {
  const { total, dp, sisa } = getValues();
  const tpl = currentTemplate;
  let rows = '';

  if (tpl === 'dp') {
    rows = `
      <div class="computed-row"><span class="computed-label">Total Project</span><span class="computed-value">${fmt(total)}</span></div>
      <div class="computed-row accent"><span class="computed-label">Down Payment 50%</span><span class="computed-value">${fmt(dp)}</span></div>
      <div class="computed-row"><span class="computed-label">Sisa (nanti)</span><span class="computed-value">${fmt(sisa)}</span></div>`;
  } else if (tpl === 'pel') {
    rows = `
      <div class="computed-row"><span class="computed-label">Total Project</span><span class="computed-value">${fmt(total)}</span></div>
      <div class="computed-row paid"><span class="computed-label">DP 50% ✓ PAID</span><span class="computed-value">${fmt(dp)}</span></div>
      <div class="computed-row accent"><span class="computed-label">Sisa / Amount Due</span><span class="computed-value">${fmt(sisa)}</span></div>`;
  } else {
    rows = `
      <div class="computed-row"><span class="computed-label">Total Project</span><span class="computed-value">${fmt(total)}</span></div>
      <div class="computed-row paid"><span class="computed-label">DP 50% ✓ PAID</span><span class="computed-value">${fmt(dp)}</span></div>
      <div class="computed-row paid"><span class="computed-label">Sisa ✓ PAID</span><span class="computed-value">${fmt(sisa)}</span></div>
      <div class="computed-row green"><span class="computed-label">SETTLED ✓</span><span class="computed-value">${fmt(total)}</span></div>`;
  }

  document.getElementById('computed-box').innerHTML = rows;
}

function buildInvoiceHTML() {
  const v   = getValues();
  const tpl = currentTemplate;

  let statusBadge = '', statusText = '';
  if (tpl === 'dp')  { statusBadge = 'badge-pending'; statusText = 'Pending'; }
  else if (tpl === 'pel') { statusBadge = 'badge-balance'; statusText = 'Pending Balance'; }
  else               { statusBadge = 'badge-settled'; statusText = 'Settled'; }

  let totalsHtml = '';
  if (tpl === 'dp') {
    totalsHtml = `
      <div class="total-row"><span class="total-label">Subtotal</span><span class="total-value">${fmt(v.total)}</span></div>
      <div class="total-row"><span class="total-label">Down Payment 50%</span><span class="total-value">${fmt(v.dp)}</span></div>
      <div class="total-row amount-due"><span class="total-label">Amount Due</span><span class="total-value">${fmt(v.dp)}</span></div>`;
  } else if (tpl === 'pel') {
    totalsHtml = `
      <div class="total-row"><span class="total-label">Subtotal</span><span class="total-value">${fmt(v.total)}</span></div>
      <div class="total-row"><span class="total-label paid-label">Down Payment 50% &nbsp;✓ PAID</span><span class="total-value paid-text">${fmt(v.dp)}</span></div>
      <div class="total-row"><span class="total-label">Remaining Payment</span><span class="total-value">${fmt(v.sisa)}</span></div>
      <div class="total-row amount-due"><span class="total-label">Amount Due</span><span class="total-value">${fmt(v.sisa)}</span></div>`;
  } else {
    totalsHtml = `
      <div class="total-row"><span class="total-label">Subtotal</span><span class="total-value">${fmt(v.total)}</span></div>
      <div class="total-row"><span class="total-label paid-label">Down Payment 50% &nbsp;✓ PAID</span><span class="total-value paid-text">${fmt(v.dp)}</span></div>
      <div class="total-row"><span class="total-label paid-label">Remaining Payment &nbsp;✓ PAID</span><span class="total-value paid-text">${fmt(v.sisa)}</span></div>
      <div class="total-row amount-due"><span class="total-label">Settled ✓</span><span class="total-value">${fmt(v.total)}</span></div>`;
  }

  const paymentHtml = tpl !== 'set' ? `
    <div class="inv-payment">
      <div class="inv-section-title">Payment Instruction:</div>
      <div class="inv-bank-name">Bank Transfer</div>
      <div class="inv-bank-no">SMBCI: 90014746343<br>JULI ISKANDAR ZAKAT</div>
    </div>` : '<div style="flex:1"></div>';

  let termsItems = [];
  if (tpl === 'dp') {
    termsItems = [
      'Silahkan melakukan pembayaran uang muka sebesar 50% dari seluruh perkiraan biaya selambat-lambatnya 13 (tiga belas) hari sebelum project dimulai',
      'Uang muka tidak dapat ditarik kembali dengan alasan apapun',
      'Sisa pembayaran diharapkan dapat dilunasi 3 (tiga) hari setelah pengambilan video di lapangan selesai',
      'FREE 1x revisi musik & video',

async function saveToSheets() {
  const v = getValues();
  const tplLabel = { dp:'DP 50%', pel:'Pelunasan', set:'Settled' }[currentTemplate];
  const payload = {
    invoiceNo:  v.invNo,
    tanggal:    v.invDate,
    clientName: v.clientName,
    clientWA:   v.clientWA,
    projTitle:  v.projTitle,
    total:      v.total,
    dp:         v.dp,
    sisa:       v.sisa,
    template:   tplLabel
  };
  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    const json = await res.json();
    return json.status === 'ok';
  } catch(err) {
    console.error('Sheets error:', err);
    return false;
  }
}

async function downloadPDF() {
  const v   = getValues();
  const btn = document.getElementById('btn-pdf');
  const ori = btn.textContent;

  btn.textContent = 'Menyimpan ke Sheets...';
  btn.disabled = true;

  const saved = await saveToSheets();

  btn.textContent = 'Membuat PDF...';

  document.getElementById('invoice-content').innerHTML = buildInvoiceHTML();

  const el  = document.getElementById('invoice-content');
  const filename = `Invoice_${v.invNo}_${(v.clientName || 'Client').replace(/\s+/g,'_')}.pdf`;

  const opt = {
    margin: 0,
    filename: filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, letterRendering: true },
    jsPDF: { unit: 'px', format: [620, el.scrollHeight + 80], orientation: 'portrait' }
  };

  await html2pdf().set(opt).from(el).save();

  btn.textContent = saved ? '✓ Tersimpan di Sheets!' : '⚠ PDF ok, Sheets gagal';
  btn.disabled = false;
  setTimeout(() => { btn.textContent = ori; }, 3000);
}
